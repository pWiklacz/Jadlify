name: Deploy Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: 10.0.x
  NODE_VERSION: 22
  AZURE_WEBAPP_NAME: jadlify-mvp-wikla
  API_PROJECT: src/Jadlify.API/Jadlify.API.csproj
  WEB_DIR: src/Jadlify.Web
  PUBLISH_DIR: ./publish

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Node is needed both for the frontend quality gate below and for the
      # publish-time MSBuild target (BuildSpa) that builds the SPA into wwwroot.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WEB_DIR }}/package-lock.json

      - name: Frontend quality gate
        working-directory: ${{ env.WEB_DIR }}
        run: |
          npm ci
          npm run lint
          npm test

      - name: Restore
        run: dotnet restore Jadlify.slnx

      - name: Build
        run: dotnet build Jadlify.slnx --configuration Release --no-restore -m:1 -p:UseSharedCompilation=false --verbosity minimal

      - name: Test
        run: dotnet test Jadlify.slnx --configuration Release --no-build -m:1 -p:UseSharedCompilation=false --verbosity minimal

      - name: Publish
        run: dotnet publish ${{ env.API_PROJECT }} --configuration Release --no-build --output ${{ env.PUBLISH_DIR }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}
